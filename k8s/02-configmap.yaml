#===============================================================================
# LYOKO ONLYOFFICE - CONFIGMAP
#===============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: onlyoffice-config
  namespace: lyoko-onlyoffice
data:
  # JWT Configuration
  jwt-enabled: "true"
  # Use a custom header so outbound download requests to SAS URLs do not send Authorization.
  jwt-header: "X-Onlyoffice-Token"
  jwt-in-body: "true"
  
  # WOPI Configuration (for future Office integrations)
  wopi-enabled: "false"
  
  # Connection limits
  max-connections: "100"
  
  # File size limits (in bytes) - 100MB
  file-size-limit: "104857600"
  
  # Public document server URL (browser-facing, TLS-terminated upstream).
  # Must match onlyoffice-public-url in the lyoko-web configmap.
  server-url: "https://docs.averoslab.com"
