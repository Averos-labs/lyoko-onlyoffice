#===============================================================================
# LYOKO ONLYOFFICE - INGRESS (Optional - if using Ingress Controller)
#===============================================================================
# Uncomment and configure if using nginx-ingress or similar
# Otherwise, use the LoadBalancer service directly
#===============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: onlyoffice-ingress
  namespace: lyoko-onlyoffice
  labels:
    app: onlyoffice
  annotations:
    # nginx ingress
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$request_uri"
    # SSL
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - onlyoffice.lyoko.app
      secretName: onlyoffice-tls
  rules:
    - host: onlyoffice.lyoko.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: onlyoffice
                port:
                  number: 80
