#===============================================================================
# LYOKO ONLYOFFICE - INGRESS (Optional - if using an nginx Ingress Controller)
#===============================================================================
# Only needed if you front the Document Server with an nginx ingress controller.
# The default deployment instead exposes the `onlyoffice-external` LoadBalancer
# directly, with TLS terminated upstream (e.g. Cloudflare) for docs.averoslab.com.
# Enable this only when ENABLE_INGRESS=true and an nginx controller is installed.
#===============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: onlyoffice-ingress
  namespace: lyoko-onlyoffice
  labels:
    app: onlyoffice
  annotations:
    # nginx ingress
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # Sticky sessions: OnlyOffice co-editing needs a client pinned to one pod.
    # Use cookie-based affinity (NOT upstream-hash-by, which shards by URL and
    # would split a single document's requests across pods).
    nginx.ingress.kubernetes.io/affinity: "cookie"
    nginx.ingress.kubernetes.io/affinity-mode: "persistent"
    nginx.ingress.kubernetes.io/session-cookie-name: "onlyoffice-affinity"
    # SSL
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - docs.averoslab.com
      secretName: onlyoffice-tls
  rules:
    - host: docs.averoslab.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: onlyoffice
                port:
                  number: 80
