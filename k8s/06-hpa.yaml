#===============================================================================
# LYOKO ONLYOFFICE - HORIZONTAL POD AUTOSCALER (INTENTIONALLY DISABLED)
#===============================================================================
# The HPA is deliberately NOT defined.
#
# The standard `onlyoffice/documentserver` image is a single-instance product:
# it bundles its own PostgreSQL, RabbitMQ and Redis inside the pod and keeps
# co-editing state in that one instance. Autoscaling it to multiple replicas:
#   - splits co-editing sessions across pods (last-write-wins data loss),
#   - breaks WebSocket co-editing without sticky sessions, and
#   - deadlocks on the ReadWriteOnce PVCs (Multi-Attach error) when a second
#     pod is scheduled on another node.
#
# Therefore we scale this component VERTICALLY (CPU/memory limits in
# 04-deployment.yaml), not horizontally.
#
# To genuinely serve many concurrent editors with horizontal scaling, deploy the
# OnlyOffice HA topology instead: an external shared PostgreSQL + RabbitMQ +
# Redis, multiple stateless Document Server pods, and a load balancer with
# session affinity. That is a separate architecture and is not enabled here.
#
# If an HPA was previously applied to the cluster, remove it:
#   kubectl delete hpa onlyoffice-hpa -n lyoko-onlyoffice --ignore-not-found
#===============================================================================

