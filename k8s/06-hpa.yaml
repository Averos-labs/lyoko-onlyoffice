#===============================================================================
# LYOKO ONLYOFFICE - HORIZONTAL POD AUTOSCALER
#===============================================================================
# Scales based on CPU and memory usage
# Min 1 pod (always warm for instant response)
# Max 5 pods (scale under heavy document processing)
#===============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: onlyoffice-hpa
  namespace: lyoko-onlyoffice
  labels:
    app: onlyoffice
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: onlyoffice-documentserver
  minReplicas: 1
  maxReplicas: 5
  metrics:
    # Scale on CPU - document conversion is CPU intensive
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    # Scale on memory - large documents consume memory
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    # Scale up quickly when load increases
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
    # Scale down slowly to avoid flapping
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
      selectPolicy: Min
