#===============================================================================
# LYOKO ONLYOFFICE - DEPLOYMENT
#===============================================================================
# Production-ready OnlyOffice Document Server with:
# - Dedicated node pool with tolerations
# - Health checks for zero-downtime deployments
# - Resource limits for stability
# - Persistent storage for documents
#===============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: onlyoffice-documentserver
  namespace: lyoko-onlyoffice
  labels:
    app: onlyoffice
    app.kubernetes.io/name: onlyoffice
    app.kubernetes.io/part-of: lyoko
    app.kubernetes.io/component: document-server
spec:
  # IMPORTANT: keep this at 1.
  # The standard onlyoffice/documentserver image bundles its own PostgreSQL,
  # RabbitMQ and Redis *inside the pod*, and its co-editing state lives in that
  # single instance. Running more than one replica of this image means two users
  # editing the same document can land on different pods -> split-brain sessions
  # and silent last-write-wins data loss. The ReadWriteOnce PVCs below also cannot
  # be mounted by a second pod on another node (Multi-Attach error).
  # To scale horizontally you must deploy the HA topology (external shared
  # PostgreSQL + RabbitMQ + Redis + multiple stateless DS pods + sticky sessions).
  # Until then, scale vertically via the resource limits below. The HPA in
  # 06-hpa.yaml is intentionally disabled for this reason.
  replicas: 1
  selector:
    matchLabels:
      app: onlyoffice
  strategy:
    # Recreate (not RollingUpdate): the RWO PVCs can only be attached to one pod
    # at a time, so a surge pod during a rolling update would deadlock on a
    # Multi-Attach error. Recreate tears down the old pod (releasing the disk)
    # before starting the new one.
    type: Recreate
  template:
    metadata:
      labels:
        app: onlyoffice
        app.kubernetes.io/name: onlyoffice
        app.kubernetes.io/part-of: lyoko
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "80"
        prometheus.io/path: "/info/info.json"
    spec:
      # Schedule on dedicated onlyoffice node pool
      nodeSelector:
        workload: onlyoffice
      
      # Tolerate the onlyoffice taint
      tolerations:
        - key: "workload"
          operator: "Equal"
          value: "onlyoffice"
          effect: "NoSchedule"
      
      # Graceful shutdown (OnlyOffice needs time to save docs)
      terminationGracePeriodSeconds: 60
      
      # Security context
      securityContext:
        fsGroup: 104  # onlyoffice group
      
      containers:
        - name: documentserver
          image: onlyoffice/documentserver:8.2
          imagePullPolicy: IfNotPresent
          
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
          
          env:
            # JWT Configuration
            - name: JWT_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: onlyoffice-config
                  key: jwt-enabled
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: onlyoffice-secrets
                  key: jwt-secret
            - name: JWT_HEADER
              valueFrom:
                configMapKeyRef:
                  name: onlyoffice-config
                  key: jwt-header
            - name: JWT_IN_BODY
              valueFrom:
                configMapKeyRef:
                  name: onlyoffice-config
                  key: jwt-in-body
            
            # WOPI
            - name: WOPI_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: onlyoffice-config
                  key: wopi-enabled
            
            # Performance tuning
            - name: NGINX_WORKER_CONNECTIONS
              value: "4096"
            - name: DS_EXAMPLE
              value: "false"
          
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          
          # Volume mounts for persistence
          volumeMounts:
            - name: data
              mountPath: /var/www/onlyoffice/Data
            - name: cache
              mountPath: /var/lib/onlyoffice
            - name: logs
              mountPath: /var/log/onlyoffice
          
          # Health checks
          startupProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30  # 5 minutes to start
            timeoutSeconds: 5
          
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 10
          
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 80
            initialDelaySeconds: 0
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
      
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: onlyoffice-data
        - name: cache
          persistentVolumeClaim:
            claimName: onlyoffice-cache
        - name: logs
          persistentVolumeClaim:
            claimName: onlyoffice-logs
---
#===============================================================================
# POD DISRUPTION BUDGET - Ensure availability during updates
#===============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: onlyoffice-pdb
  namespace: lyoko-onlyoffice
spec:
  # Single-replica stateful app: allow the one pod to be evicted so node drains
  # and cluster upgrades are not blocked. (minAvailable: 1 here would deadlock
  # drains because there is no second replica to keep available.)
  maxUnavailable: 1
  selector:
    matchLabels:
      app: onlyoffice
