#===============================================================================
# LYOKO ONLYOFFICE - SERVICE
#===============================================================================
apiVersion: v1
kind: Service
metadata:
  name: onlyoffice
  namespace: lyoko-onlyoffice
  labels:
    app: onlyoffice
    app.kubernetes.io/name: onlyoffice
    app.kubernetes.io/part-of: lyoko
spec:
  type: ClusterIP
  # OnlyOffice co-editing uses long-lived WebSocket connections that must stay
  # pinned to the same backend pod. Pin by client IP as defense-in-depth (the
  # deployment is single-replica today; this keeps correctness if it ever isn't).
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: onlyoffice
---
#===============================================================================
# EXTERNAL SERVICE - LoadBalancer for direct access
#===============================================================================
apiVersion: v1
kind: Service
metadata:
  name: onlyoffice-external
  namespace: lyoko-onlyoffice
  labels:
    app: onlyoffice
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthcheck
spec:
  type: LoadBalancer
  # Keep a client's WebSocket co-editing traffic on one backend pod.
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: onlyoffice
