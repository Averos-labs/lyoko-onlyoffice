services:
  onlyoffice:
    image: onlyoffice/documentserver:8.2
    container_name: lyoko-onlyoffice
    restart: unless-stopped
    ports:
      - "8080:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # JWT Configuration for security
      - JWT_ENABLED=true
      - JWT_SECRET=${ONLYOFFICE_JWT_SECRET:-lyoko-local-jwt-secret}
      # Header the DS expects the JWT in. Keep this in sync with
      # ONLYOFFICE_JWT_HEADER in the lyoko-web server config.
      - JWT_HEADER=Authorization
      - JWT_IN_BODY=true
      # Allow local connections
      - USE_UNAUTHORIZED_STORAGE=true
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_cache:/var/lib/onlyoffice
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_cache:
